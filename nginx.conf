server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index html/index.html;

    location = / {
        return 302 /html/index.html;
    }

    location = /config.js {
        add_header Cache-Control "no-store";
        default_type application/javascript;
        try_files /config.js =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
